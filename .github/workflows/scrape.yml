name: Scrape Rami Levy Store 013

on:
  schedule:
    # Runs daily at 06:00 UTC (09:00 Israel time)
    - cron: "35 3 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Upload store 013 data
        uses: actions/upload-artifact@v4
        with:
          name: rami-levy-store-013-${{ github.run_id }}
          path: dumps/RamiLevy_store_013/
          retention-days: 90
